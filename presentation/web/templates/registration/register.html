{% extends "base.html" %}
{% block title %}Register - BugTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="panel p-4">
            <h1 class="h4 mb-2">Create a reporter account</h1>
            <p class="text-muted">Reporter accounts are independent. Choose the affected company when you submit a bug.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Create account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
