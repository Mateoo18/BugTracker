{% extends "base.html" %}
{% block title %}Set new password - BugTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="panel p-4">
            <h1 class="h4 mb-2">Set your new password</h1>
            <p class="text-muted">You logged in with a temporary first-login password. Set your own password to continue.</p>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary"><i class="fa-solid fa-key"></i> Save new password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
