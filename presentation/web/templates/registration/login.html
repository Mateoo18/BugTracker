{% extends "base.html" %}
{% block title %}Log in - BugTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="panel p-4">
            <h1 class="h4 mb-3">Log in</h1>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket"></i> Log in</button>
            </form>
            <div class="mt-3 small">
                No account yet? <a href="{% url 'web:register' %}">Create a reporter account</a>.
            </div>
        </div>
    </div>
</div>
{% endblock %}
