<div class="table-responsive">
    <table class="table table-sm align-middle">
        <thead><tr><th>ID</th><th>Title</th><th>Company</th><th>Module</th><th>Status</th></tr></thead>
        <tbody>
        {% for bug in bugs %}
            <tr>
                <td>#{{ bug.id }}</td>
                <td><a href="{{ bug.get_absolute_url }}">{{ bug.title }}</a></td>
                <td>{{ bug.company.name }}</td>
                <td>{{ bug.module }}</td>
                <td><span class="badge text-bg-light">{{ bug.get_status_display }}</span></td>
            </tr>
        {% empty %}
            <tr><td colspan="5" class="text-muted">No bugs found.</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
